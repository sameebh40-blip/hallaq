name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    name: Web lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint migrations
        run: npm run lint:migrations

      - name: Lint (Next)
        run: |
          npm run lint:landing
          npm run lint:customer
          npm run lint:shop
          npm run lint:admin

      - name: Build (Next)
        run: |
          npm run build:landing
          npm run build:customer
          npm run build:shop
          npm run build:admin

  flutter:
    name: Flutter analyze + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
