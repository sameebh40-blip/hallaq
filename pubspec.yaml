name: hallaq
description: Hallaq - social barber discovery and booking platform for Bahrain.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter_skill: ^0.2.6
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  http: ^1.2.2
  flutter_riverpod: ^2.6.1
  go_router: ^14.2.7
  supabase_flutter: ^2.8.0
  flutter_secure_storage: ^9.2.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  image_picker: ^1.1.2
  image: ^4.2.0
  share_plus: ^10.0.2
  timeago: ^3.7.0
  url_launcher: ^6.3.0
  video_player: ^2.9.2
  video_thumbnail: ^0.5.3
  video_compress: ^3.1.0
  google_maps_flutter: ^2.7.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1
  firebase_core: ^3.5.0
  firebase_messaging: ^15.1.2
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/mascot/
    - assets/brand/
    - assets/icons/

